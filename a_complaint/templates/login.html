{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Complaint Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"crossorigin="anonymous"> </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body class="bg-light">
    <div class="d-flex align-items-center justify-content-center min-vh-100 px-3 py-5">
        <div class="card shadow border-0 w-100" style="max-width: 450px; border-radius: 12px;">   
            <div class="card-header border-0 text-center text-white py-4" style="background-color: #0d1b2a; border-top-left-radius: 12px; border-top-right-radius: 12px;">
                <h3 class="fw-bold mb-1"><i class="bi bi-shield-lock me-2"></i>Account Login</h3>
                <div class="small text-white-50" id="home">
                    Already have an account? Log in below.
                </div>
            </div>

            <div class="card-body p-4 p-sm-5">
                
                <form action="" method="POST">
                    {% csrf_token %}  
                    <div class="django-form-fields mb-4">
                        {{ form.as_p }}
                    </div>
                    <div class="d-grid gap-2 pt-2">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm" style="background-color: #0d1b2a; border: none; font-size: 1.1rem;">
                            Log In
                        </button>
                    </div>
                </form>
            </div>

            <div class="card-footer bg-white border-0 text-center pb-4 pt-0">
                <p class="mb-0 small text-muted">
                    Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none fw-bold" style="color: #0d1b2a;">Register Here</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
