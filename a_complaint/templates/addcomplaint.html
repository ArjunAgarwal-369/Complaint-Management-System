<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <main class="container py-5">   
        <h2 class="text-center mb-4 fw-bold text-dark">Complaint Form</h2>
        <div class="row justify-content-center">
            <div class="w-100 w-sm-75 w-md-50"> 
                <div class="p-4 p-sm-5 shadow-sm rounded-3" style="background-color: rgb(240, 240, 240);">
                    <form method="post" novalidate>
                        {% csrf_token %}
                        <div class="mb-4 d-grid gap-3">
                            {{ form.as_p }}
                        </div>
                        
                        <div class="d-flex flex-column flex-sm-row gap-2 pt-2">
                            <button type="submit" class="btn btn-success px-4 py-2 fw-bold flex-grow-1">
                                SAVE
                            </button>
                            <button type="reset" class="btn btn-warning px-4 py-2 fw-bold flex-grow-1 text-dark">
                                CANCEL
                            </button>
                        </div>   
                    </form>  
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
